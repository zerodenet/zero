[package]
name = "zero"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true

[features]
default = ["full", "status-api"]
full = [
    "inbound-socks5",
    "inbound-http-connect",
    "inbound-mixed",
    "outbound-socks5",
]
inbound-socks5 = ["zero-engine/inbound-socks5"]
inbound-http-connect = ["zero-engine/inbound-http-connect"]
inbound-mixed = ["zero-engine/inbound-mixed"]
outbound-socks5 = ["zero-engine/outbound-socks5"]
status-api = []
event-dispatcher = ["dep:zero-connector", "zero-connector/event-dispatcher"]
sink-jsonl = ["event-dispatcher", "zero-connector/sink-jsonl"]
panel-connector = ["status-api", "event-dispatcher", "zero-connector/panel-connector"]

[workspace]
members = [
    "crates/traits",
    "crates/core",
    "crates/api",
    "crates/config",
    "crates/connector",
    "crates/router",
    "crates/platform/tokio",
    "protocols/socks5",
    "protocols/http-connect",
    "crates/engine",
]
resolver = "2"

[workspace.package]
version = "0.0.2"
edition = "2021"
authors = ["Zero Contributors"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/zerodenet/zero"
homepage = "https://zerodenet.org"

[workspace.dependencies]
ipnet = { version = "2.11", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
tokio = { version = "1", features = ["fs", "io-util", "macros", "net", "rt-multi-thread", "signal", "sync", "time"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }

[dependencies]
serde_json.workspace = true
tokio.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
zero-api = { path = "crates/api" }
zero-engine = { path = "crates/engine", default-features = false }
zero-connector = { path = "crates/connector", optional = true, default-features = false }
