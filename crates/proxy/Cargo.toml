[package]
name = "zero-proxy"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true

[features]
default = [
    "inbound-socks5",
    "inbound-http-connect",
    "inbound-mixed",
    "inbound-vless",
    "outbound-socks5",
    "outbound-vless",
]
inbound-socks5 = ["dep:zero-protocol-socks5"]
inbound-http-connect = ["dep:zero-protocol-http-connect"]
inbound-mixed = ["inbound-socks5", "inbound-http-connect"]
inbound-vless = [
    "dep:rustls",
    "dep:rustls-pemfile",
    "dep:tokio-rustls",
    "dep:zero-protocol-vless",
]
outbound-socks5 = ["dep:zero-protocol-socks5"]
outbound-vless = [
    "dep:rustls",
    "dep:rustls-pemfile",
    "dep:tokio-rustls",
    "dep:webpki-roots",
    "dep:zero-protocol-vless",
]

[dependencies]
rustls = { version = "0.23", default-features = false, features = ["ring", "std"], optional = true }
rustls-pemfile = { version = "2", optional = true }
tokio.workspace = true
tokio-rustls = { version = "0.26", default-features = false, optional = true }
tracing.workspace = true
webpki-roots = { version = "1", optional = true }
zero-config = { path = "../config" }
zero-core = { path = "../core" }
zero-engine = { path = "../engine" }
zero-platform-tokio = { path = "../platform/tokio" }
zero-protocol-http-connect = { path = "../../protocols/http-connect", optional = true }
zero-protocol-socks5 = { path = "../../protocols/socks5", optional = true }
zero-protocol-vless = { path = "../../protocols/vless", optional = true }
zero-traits = { path = "../traits" }

[dev-dependencies]
rcgen = "0.14"
serde_json.workspace = true
tracing-subscriber.workspace = true
zero-api = { path = "../api" }
