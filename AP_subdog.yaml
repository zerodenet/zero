redir-port: 23457
#面板设置
external-controller: 192.168.50.1:9990
external-ui: dashboard
external-ui-name: zashboard
external-ui-url: https://github.com/Zephyruso/zashboard/releases/latest/download/dist-cdn-fonts.zip
secret: "clash"
#缓存设置
profile:
  store-selected: false
  store-fake-ip: false
#GEO数据库
geodata-mode: true
geox-url:
  geoip: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat"
  geosite: "https://github.com/flyhigherpi/merlinclash_clash_related/raw/refs/heads/master/geosite/geosite.dat"
#启动参数
allow-lan: true
mode: rule
log-level: error
ipv6: true
unified-delay: true
hosts:
  services.googleapis.cn: 74.125.193.94
  time.android.com: 203.107.6.88
  gitlab.bawcat.wiki: 192.168.50.20
  drone.server.bawcat.wiki: 192.168.50.22
  docker.registry.bawcat.wiki: 192.168.50.25
sniffer:
  enable: true
  force-dns-mapping: false
  parse-pure-ip: true
  override-destination: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]
      override-destination: false
  force-domain:
    - '+.v2ex.com'
  skip-domain:
    - 'Mijia Cloud'
    - 'dlg.io.mi.com'
    - '+.apple.com'
dns:
  enable: true
  ipv6: true
  listen: :23453
  enhanced-mode: redir-host
  respect-rules: true
  proxy-server-nameserver:
    - 119.29.29.29
    - 223.5.5.5
  nameserver-policy:
    "+.steampowered.com": "223.5.5.5"
    "geosite: gfw":
      - https://dns.dns-53.us/dns-query
      - tls://sg01.dns4me.net
      - tls://unfiltered.adguard-dns.com
  nameserver:
    - https://doh.pub/dns-query
    - 223.5.5.5
tcp-concurrent: true
tproxy-port: 23458
routing-mark: 255
