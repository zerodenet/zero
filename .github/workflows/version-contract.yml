name: Version Contract

on:
  push:
    branches: [develop, main]
    paths:
      - "Cargo.toml"
      - "docs/control-plane-api/breaking-changes.md"
      - "scripts/release.ps1"
      - "scripts/release.sh"
      - ".github/workflows/release.yml"
      - ".github/workflows/docs.yml"
      - ".github/workflows/version-contract.yml"
  pull_request:
    branches: [develop, main]
    paths:
      - "Cargo.toml"
      - "docs/control-plane-api/breaking-changes.md"
      - "scripts/release.ps1"
      - "scripts/release.sh"
      - ".github/workflows/release.yml"
      - ".github/workflows/docs.yml"
      - ".github/workflows/version-contract.yml"

permissions:
  contents: read

jobs:
  check:
    name: Validate Cargo and compatibility versions
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Bash contract
        run: ./scripts/release.sh --check

      - name: PowerShell contract
        shell: pwsh
        run: ./scripts/release.ps1 -Check
