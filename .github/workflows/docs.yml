name: Deploy Docs

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      project-name:
        description: 'Cloudflare Pages project name'
        required: false
        default: 'zero-docs'
        type: string

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Verify version contract
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            python3 scripts/version_contract.py check-release "${GITHUB_REF_NAME#v}"
          else
            python3 scripts/version_contract.py check
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: docs

      - name: Build
        run: npm run build
        working-directory: docs
        continue-on-error: true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: docs
          command: >-
            pages deploy .vitepress/dist
            --project-name=${{ inputs.project-name || secrets.CLOUDFLARE_PAGES_PROJECT || 'zero-docs' }}
            --branch=main
