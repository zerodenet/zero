name: CI

on:
  push:
    branches: [develop]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - "docs/**"
      - "examples/**"
      - "proto/**"
  pull_request:
    branches: [develop]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - "docs/**"
      - "examples/**"
      - "proto/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    name: Static checks (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --features full

  check-and-test:
    name: Check & Test (Linux)
    runs-on: ubuntu-latest
    needs: static
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Check (full)
        run: cargo check --workspace --features full,status_api

      - name: Check (panel_connector)
        run: cargo check --workspace --features full,status_api,panel_connector

      - name: Test (workspace)
        run: cargo test --workspace --features full,status_api

      - name: Architecture boundary tests
        run: cargo test -p zero-proxy --test runtime_boundary --all-features
