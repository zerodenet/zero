name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml
          echo "Building zero ${VERSION}"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --features full,status-api,panel-connector --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf zero-${{ github.ref_name }}-${{ matrix.target }}.tar.gz zero
          sha256sum zero-${{ github.ref_name }}-${{ matrix.target }}.tar.gz > zero-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256

      - name: Package (windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a zero-${{ github.ref_name }}-${{ matrix.target }}.zip zero.exe
          sha256sum zero-${{ github.ref_name }}-${{ matrix.target }}.zip > zero-${{ github.ref_name }}-${{ matrix.target }}.zip.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zero-${{ github.ref_name }}-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/zero-${{ github.ref_name }}-${{ matrix.target }}.*

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate changelog
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | sed -n 2p)
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi

          {
            echo "## Changes"
            echo ""

            # Features
            git log "$RANGE" --format="%s" | grep -iE '^feat' | while read -r line; do
              echo "- ✨ ${line#feat: }"
            done
            FEAT_COUNT=$(git log "$RANGE" --format="%s" | grep -ciE '^feat' || true)
            if [ "$FEAT_COUNT" -gt 0 ]; then echo ""; fi

            # Fixes
            git log "$RANGE" --format="%s" | grep -iE '^fix' | while read -r line; do
              echo "- 🐛 ${line#fix: }"
            done
            FIX_COUNT=$(git log "$RANGE" --format="%s" | grep -ciE '^fix' || true)
            if [ "$FIX_COUNT" -gt 0 ]; then echo ""; fi

            # Refactors
            git log "$RANGE" --format="%s" | grep -iE '^refactor' | while read -r line; do
              echo "- 🔧 ${line#refactor: }"
            done
            REF_COUNT=$(git log "$RANGE" --format="%s" | grep -ciE '^refactor' || true)
            if [ "$REF_COUNT" -gt 0 ]; then echo ""; fi

            # Docs
            git log "$RANGE" --format="%s" | grep -iE '^docs' | while read -r line; do
              echo "- 📖 ${line#docs: }"
            done
            DOC_COUNT=$(git log "$RANGE" --format="%s" | grep -ciE '^docs' || true)
            if [ "$DOC_COUNT" -gt 0 ]; then echo ""; fi

            # Chores
            git log "$RANGE" --format="%s" | grep -iE '^chore' | while read -r line; do
              echo "- 🏗  ${line#chore: }"
            done
            CHORE_COUNT=$(git log "$RANGE" --format="%s" | grep -ciE '^chore' || true)
            if [ "$CHORE_COUNT" -gt 0 ]; then echo ""; fi

            # Tests
            git log "$RANGE" --format="%s" | grep -iE '^test' | while read -r line; do
              echo "- ✅ ${line#test: }"
            done

            echo ""
            echo "---"
            echo "🤖 auto-generated by GitHub Actions"
          } > /tmp/changelog.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: /tmp/changelog.md
          files: artifacts/**/*
