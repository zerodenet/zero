name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: linux-x86_64
            ext: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            name: darwin-x86_64
            ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            name: darwin-aarch64
            ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x86_64
            ext: zip

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml
          echo "Building zero ${VERSION} for ${{ matrix.name }}"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --features full,status-api,panel-connector --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release

          # versioned archive
          tar czf zero-${{ github.ref_name }}-${{ matrix.name }}.${{ matrix.ext }} zero
          sha256sum zero-${{ github.ref_name }}-${{ matrix.name }}.${{ matrix.ext }} \
            > zero-${{ github.ref_name }}-${{ matrix.name }}.${{ matrix.ext }}.sha256

          # latest archive (fixed name for auto-download)
          cp zero-${{ github.ref_name }}-${{ matrix.name }}.${{ matrix.ext }} zero-${{ matrix.name }}.${{ matrix.ext }}
          cp zero-${{ github.ref_name }}-${{ matrix.name }}.${{ matrix.ext }}.sha256 zero-${{ matrix.name }}.${{ matrix.ext }}.sha256

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release

          # versioned archive
          7z a zero-${{ github.ref_name }}-${{ matrix.name }}.${{ matrix.ext }} zero.exe
          sha256sum zero-${{ github.ref_name }}-${{ matrix.name }}.${{ matrix.ext }} \
            > zero-${{ github.ref_name }}-${{ matrix.name }}.${{ matrix.ext }}.sha256

          # latest archive (fixed name for auto-download)
          cp zero-${{ github.ref_name }}-${{ matrix.name }}.${{ matrix.ext }} zero-${{ matrix.name }}.${{ matrix.ext }}
          cp zero-${{ github.ref_name }}-${{ matrix.name }}.${{ matrix.ext }}.sha256 zero-${{ matrix.name }}.${{ matrix.ext }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zero-${{ github.ref_name }}-${{ matrix.name }}
          path: target/${{ matrix.target }}/release/zero-*.${{ matrix.ext }}*

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Flatten artifact tree
        shell: bash
        run: |
          # merge-multiple flattens all files into artifacts/ directly
          ls -la artifacts/

      - name: Generate changelog
        shell: bash
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | sed -n 2p)
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi

          {
            echo "## Assets"
            echo ""
            echo "| Platform | File | SHA256 |"
            echo "|----------|------|--------|"
            for f in artifacts/zero-latest-*; do
              continue  # placeholder, skip
            done
            echo ""
            echo "### Fixed-name (latest)"
            echo ""
            echo "- \`zero-linux-x86_64.tar.gz\`"
            echo "- \`zero-darwin-x86_64.tar.gz\`"
            echo "- \`zero-darwin-aarch64.tar.gz\`"
            echo "- \`zero-windows-x86_64.zip\`"
            echo ""
            echo "Download: \`https://github.com/\${{ github.repository }}/releases/latest/download/zero-{platform}.{ext}\`"
            echo ""
            echo "## Changes"
            echo ""

            # Features
            git log "$RANGE" --format="%s" | grep -iE '^feat' | while read -r line; do
              echo "- ✨ ${line#feat: }"
            done
            FEAT_COUNT=$(git log "$RANGE" --format="%s" | grep -ciE '^feat' || true)
            if [ "$FEAT_COUNT" -gt 0 ]; then echo ""; fi

            # Fixes
            git log "$RANGE" --format="%s" | grep -iE '^fix' | while read -r line; do
              echo "- 🐛 ${line#fix: }"
            done
            FIX_COUNT=$(git log "$RANGE" --format="%s" | grep -ciE '^fix' || true)
            if [ "$FIX_COUNT" -gt 0 ]; then echo ""; fi

            # Refactors
            git log "$RANGE" --format="%s" | grep -iE '^refactor' | while read -r line; do
              echo "- 🔧 ${line#refactor: }"
            done
            REF_COUNT=$(git log "$RANGE" --format="%s" | grep -ciE '^refactor' || true)
            if [ "$REF_COUNT" -gt 0 ]; then echo ""; fi

            # Docs
            git log "$RANGE" --format="%s" | grep -iE '^docs' | while read -r line; do
              echo "- 📖 ${line#docs: }"
            done
            DOC_COUNT=$(git log "$RANGE" --format="%s" | grep -ciE '^docs' || true)
            if [ "$DOC_COUNT" -gt 0 ]; then echo ""; fi

            echo ""
            echo "---"
            echo "🤖 auto-generated by GitHub Actions"
          } > /tmp/changelog.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: /tmp/changelog.md
          files: artifacts/*
          make_latest: true
