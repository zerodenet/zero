name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  guard:
    name: Verify tag is on main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Ensure tag points to main
        run: |
          if ! git branch -r --contains "$GITHUB_REF" origin/main; then
            echo "::error::Tag ${GITHUB_REF_NAME} is not on main branch"
            exit 1
          fi

  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    needs: guard
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: linux-x86_64
            ext: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            name: darwin-x86_64
            ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            name: darwin-aarch64
            ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x86_64
            ext: zip

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i.bak "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml && rm -f Cargo.toml.bak
          echo "Building zero ${VERSION} for ${{ matrix.name }}"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --features full,status-api,panel-connector --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release

          # versioned archive
          tar czf zero-${{ github.ref_name }}-${{ matrix.name }}.${{ matrix.ext }} zero
          sha256sum zero-${{ github.ref_name }}-${{ matrix.name }}.${{ matrix.ext }} \
            > zero-${{ github.ref_name }}-${{ matrix.name }}.${{ matrix.ext }}.sha256

          # latest archive (fixed name for auto-download)
          cp zero-${{ github.ref_name }}-${{ matrix.name }}.${{ matrix.ext }} zero-${{ matrix.name }}.${{ matrix.ext }}
          cp zero-${{ github.ref_name }}-${{ matrix.name }}.${{ matrix.ext }}.sha256 zero-${{ matrix.name }}.${{ matrix.ext }}.sha256

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release

          # versioned archive
          7z a zero-${{ github.ref_name }}-${{ matrix.name }}.${{ matrix.ext }} zero.exe
          sha256sum zero-${{ github.ref_name }}-${{ matrix.name }}.${{ matrix.ext }} \
            > zero-${{ github.ref_name }}-${{ matrix.name }}.${{ matrix.ext }}.sha256

          # latest archive (fixed name for auto-download)
          cp zero-${{ github.ref_name }}-${{ matrix.name }}.${{ matrix.ext }} zero-${{ matrix.name }}.${{ matrix.ext }}
          cp zero-${{ github.ref_name }}-${{ matrix.name }}.${{ matrix.ext }}.sha256 zero-${{ matrix.name }}.${{ matrix.ext }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zero-${{ github.ref_name }}-${{ matrix.name }}
          path: target/${{ matrix.target }}/release/zero-*.${{ matrix.ext }}*

  docs:
    name: Deploy Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install and build
        run: |
          cd docs && npm install && npm run build

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, docs]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Flatten artifact tree
        shell: bash
        run: |
          # merge-multiple flattens all files into artifacts/ directly
          ls -la artifacts/

      - name: Generate changelog
        shell: bash
        run: |
          # Sort by semantic version, pick previous tag
          PREV_TAG=$(git tag --sort=-version:refname | sed -n 2p)
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi

          # Extract commit log once; exclude merge commits and release commits
          COMMITS=$(git log "$RANGE" --no-merges --format="%s" 2>/dev/null | grep -ivE '^release:' || true)

          # ── Helpers ────────────────────────────────────────────────

          # Extract and format commits matching a prefix regex.
          # $1 = pipe-separated prefixes (e.g. "improve|refactor|perf")
          extract() {
            local result
            result=$(echo "$COMMITS" | grep -iE "^(${1}):" 2>/dev/null || true)
            if [ -n "$result" ]; then
              echo "$result" | while IFS= read -r raw; do
                # Strip the prefix label (e.g. "feat: ") for display
                local body="${raw#*: }"
                echo "- ${body}"
              done
            fi
          }

          # Count commits matching a prefix regex
          count() {
            local n
            n=$(echo "$COMMITS" | grep -ciE "^(${1}):" 2>/dev/null || echo 0)
            echo "$n"
          }

          # Emit a section if there are commits in the category.
          # $1 = section title (with emoji), $2 = grep pattern
          section() {
            local title="$1" pattern="$2" n body
            n=$(count "$pattern")
            if [ "$n" -gt 0 ]; then
              echo "### ${title} (${n})"
              echo ""
              extract "$pattern"
              echo ""
            fi
          }

          # ── Build changelog ────────────────────────────────────────

          {
            echo "## 📦 Assets"
            echo ""
            echo "| Platform | Archive |"
            echo "|----------|---------|"
            echo "| Linux x86_64   | \`zero-${{ github.ref_name }}-linux-x86_64.tar.gz\`   |"
            echo "| macOS x86_64   | \`zero-${{ github.ref_name }}-darwin-x86_64.tar.gz\`  |"
            echo "| macOS aarch64  | \`zero-${{ github.ref_name }}-darwin-aarch64.tar.gz\` |"
            echo "| Windows x86_64 | \`zero-${{ github.ref_name }}-windows-x86_64.zip\`    |"
            echo ""
            echo "> **Quick download (latest):** \`https://github.com/\${{ github.repository }}/releases/latest/download/zero-{platform}.{ext}\`"
            echo ""
            echo "## 📝 Changes"
            echo ""

            section "🚀 Added"           "feat"
            section "🐛 Fixed"           "fix"
            section "🔨 Improved"        "improve|refactor|perf"
            section "🔧 Maintenance"     "chore|ci|style|test|revert"
            section "📖 Documentation"   "docs"

            echo "---"
            echo "🤖 auto-generated by GitHub Actions"
          } > /tmp/changelog.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: /tmp/changelog.md
          files: artifacts/*
          make_latest: true
